<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ClinicSys</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
	<nav class="menu">
		<a href="/index.html">Home</a>
        <a href="/pacientes.html">Pacientes</a>
    	<a href="/medicos.html" class="ativo">Médicos</a>
	</nav>
	
<div class="container">

    <h1>Cadastro de Médicos</h1>

    <div id="mensagem" class="mensagem"></div>

    <form id="formMedico">
        <input type="text" id="nome" placeholder="Nome" required>
        <input type="text" id="especialidade" placeholder="Especialidade">
        <select id="tipoRegistro">
            <option value="CRM">CRM</option>
            <option value="COREN">COREN</option>
            <option value="CRP">CRP</option>
            <option value="CRO">CRO</option>
            <option value="CRF">CRF</option>
            <option value="CREFITO">CREFITO</option>
            <option value="CRN">CRN</option>
            <option value="CRBM">CRBM</option>
            <option value="CREFONO">CREFONO</option>
            <option value="CREF">CREF</option>
            <option value="CRESS">CRESS</option>
        </select>
        <input type="text" id="registro" placeholder="Número do registro">
        <input type="text" id="telefone" placeholder="Telefone" maxlength="11" inputmode="numeric">
            <button type="submit">Cadastrar</button>
    </form>

    <h2>Médicos cadastrados</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Especialidade</th>
                <th>CRM</th>
                <th>Telefone</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody id="listaMedicos"></tbody>
    </table>

</div>

<script src="medicos.js"></script>

</body>
</html>
